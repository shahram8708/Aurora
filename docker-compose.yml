version: '3.9'
services:
  web:
    build: .
    command: gunicorn wsgi:app
    env_file:
      - .env
    volumes:
      - .:/app
      - logs:/app/logs
      - staticfiles:/app/app/static
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  celery_worker:
    build: .
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=4 -Q default
    env_file:
      - .env
    volumes:
      - .:/app
      - logs:/app/logs
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    command: celery -A celery_worker.celery beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
      - logs:/app/logs
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: social
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/app/static:ro
      - ./logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web

volumes:
  pgdata:
  logs:
  staticfiles:
