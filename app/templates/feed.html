{% extends 'base.html' %}
{% block title %}Feed{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Home</h4>
  <div class="d-flex gap-2">
    <a class="btn btn-primary" href="{{ url_for('posts.create') }}"><i class="bi bi-plus-circle me-1"></i>Create</a>
    <a class="btn btn-outline-light" href="{{ url_for('engagement.saved_posts') }}"><i class="bi bi-bookmark-heart me-1"></i>Saved</a>
  </div>
</div>
<div id="feed-container">
  {% include 'partials/post_cards.html' with context %}
</div>
<div class="text-center mt-3">
  <button class="btn btn-outline-light" id="load-more" data-offset="10"><i class="bi bi-arrow-clockwise me-1"></i>Load more</button>
</div>

<div class="modal fade" id="postModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Post</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="post-modal-body"></div>
    </div>
  </div>
</div>

<div class="modal fade" id="commentModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Comments</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="comment-list"></div>
        <div class="mt-3">
          <textarea class="form-control" id="new-comment" rows="2" placeholder="Add a comment..."></textarea>
          <button class="btn btn-primary mt-2" id="submit-comment"><i class="bi bi-send-fill me-1"></i>Post</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="likesModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="likesModalTitle">Likes</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="likesModalBody">
        <p class="text-muted mb-0">No likes yet.</p>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.like-count-link');
  if (!btn) return;
  e.preventDefault();
  const postId = btn.dataset.postId;
  const tmpl = document.getElementById(`likes-data-${postId}`);
  const body = document.getElementById('likesModalBody');
  if (tmpl && body) {
    body.innerHTML = tmpl.innerHTML || '<p class="text-muted mb-0">No likes yet.</p>';
  }
  const modalEl = document.getElementById('likesModal');
  if (modalEl) {
    const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
    modal.show();
  }
});

// Inline reply form handling
document.addEventListener('click', function(e) {
  const replyBtn = e.target.closest('.reply-btn');
  if (!replyBtn) return;
  e.preventDefault();
  e.stopPropagation();
  const postId = replyBtn.dataset.postId;
  const commentId = replyBtn.dataset.commentId;
  const slot = document.getElementById(`reply-slot-${postId}-${commentId}`);
  if (!slot) return;
  // If a form already exists here, do nothing
  if (slot.querySelector('form')) return;
  slot.innerHTML = `
    <form class="mt-2 reply-form" data-post-id="${postId}" data-parent-id="${commentId}">
      <div class="input-group input-group-sm">
        <textarea class="form-control" rows="1" placeholder="Reply..." required></textarea>
          <button class="btn btn-primary" type="submit"><i class="bi bi-send-fill me-1"></i>Send</button>
      </div>
    </form>
  `;
});

// Stop bubbling from comment/reply areas so the post card modal doesn't open
document.addEventListener('click', function(e) {
  if (e.target.closest('.comment-thread') || e.target.closest('.reply-form')) {
    e.stopPropagation();
  }
}, true);
document.addEventListener('focusin', function(e) {
  if (e.target.closest('.comment-thread') || e.target.closest('.reply-form')) {
    e.stopPropagation();
  }
}, true);

// Submit reply via fetch
document.addEventListener('submit', async function(e) {
  const form = e.target.closest('.reply-form');
  if (!form) return;
  e.preventDefault();
  const postId = form.dataset.postId;
  const parentId = form.dataset.parentId;
  const textarea = form.querySelector('textarea');
  const content = (textarea.value || '').trim();
  if (!content) return;
  const csrf = document.querySelector('meta[name="csrf-token"]')?.content || '';
  try {
    const resp = await fetch(`/engagement/comment/${postId}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': csrf,
      },
      body: JSON.stringify({content, parent_id: parentId})
    });
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();
    const repliesWrap = form.closest('.comment-block')?.querySelector('.replies');
    const targetList = repliesWrap || form.closest('.comment-block');
    const newNode = document.createElement('div');
    newNode.className = 'mb-1 reply-block';
    const timestamp = new Date().toLocaleString();
    newNode.innerHTML = `
      <div><strong>You</strong> ${content}</div>
      <div class="text-muted small d-flex gap-2 align-items-center">
        <span>${timestamp}</span>
      </div>
    `;
    targetList.appendChild(newNode);
    form.remove();
  } catch (err) {
    console.error(err);
    alert('Could not post reply');
  }
});

// Load more comments/replies (reveal hidden blocks)
document.addEventListener('click', function(e) {
  const moreCommentsBtn = e.target.closest('.load-more-comments');
  if (moreCommentsBtn) {
    e.preventDefault();
    const postId = moreCommentsBtn.dataset.postId;
    const hidden = document.getElementById(`more-comments-${postId}`);
    if (hidden) {
      hidden.classList.remove('d-none');
      moreCommentsBtn.remove();
    }
    return;
  }
  const moreRepliesBtn = e.target.closest('.load-more-replies');
  if (moreRepliesBtn) {
    e.preventDefault();
    const parentId = moreRepliesBtn.dataset.parentId;
    const hidden = document.getElementById(`more-replies-${parentId}`);
    if (hidden) {
      hidden.classList.remove('d-none');
      moreRepliesBtn.remove();
    }
  }
});
</script>
{% endblock %}
